<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Family Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #0d47a1;
            --secondary-color: #1976d2;
            --bg-color: #f4f7f6;
            --accent: #2196f3;
        }
        body { 
            background-color: var(--bg-color); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 0;
        }
        .card { 
            border: none; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
            max-width: 480px;
            padding: 2rem;
        }
        .card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 28px rgba(0,0,0,0.12); 
        }
        .btn-success {
            background-color: #10b981;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            padding: 0.75rem;
            transition: all 0.2s;
        }
        .btn-success:hover {
            background-color: #059669;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border: 1px solid #e0e0e0;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }
        .auth-icon {
            font-size: 3rem;
            color: #10b981;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card bg-white">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill auth-icon mb-2 d-inline-block"></i>
                <h3 class="fw-bold text-dark mb-0">Create Account</h3>
                <p class="text-muted small">Join your family finance network</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-info-circle me-1"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('register') }}" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label text-muted small fw-bold">FULL NAME</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="name" name="name" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label text-muted small fw-bold">EMAIL ADDRESS</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label text-muted small fw-bold">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="role" class="form-label text-muted small fw-bold">ACCOUNT ROLE</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-tag text-muted"></i></span>
                        <select class="form-select border-start-0 ps-0" id="role" name="role" required>
                            <option value="member">Member</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100 mb-3"><i class="bi bi-check-circle me-2"></i>Register Now</button>
            </form>
            <div class="text-center">
                <p class="text-muted small mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold" style="color: #10b981;">Login here</a></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
